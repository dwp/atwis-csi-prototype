{% set claim = "true" %}
{% set title = "Case details" %}

{% extends folder + "/claim/_CSIBASE.html" %}

{% block csi %}
<div class="govuk-width-container">
  <!-- <a href="#" class="govuk-back-link">Back</a> -->

  <main class="govuk-main-wrapper">

    <div class="govuk-grid-row">
      <div class="govuk-grid-column-two-thirds">

<form action="/current/cases/claim#your-tasks" method="post" novalidate>

<div class="govuk-form-group">
           <fieldset class="govuk-fieldset">
             <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
               <h1 class="govuk-fieldset__heading">
              Title (element)
               </h1>
             </legend>
             <p>

    <div class="govuk-radios govuk-radios--inline" data-module="govuk-radios">
      <div id="elements-wpa-hint" class="govuk-hint">
  Select all that apply.
</div>
<div class="govuk-checkboxes" data-module="govuk-checkboxes">
  <div class="govuk-checkboxes__item">
    <input class="govuk-checkboxes__input" id="elements-wpa" name="elements-wpa" type="checkbox" value="Specialist equipmentsses">
    <label class="govuk-label govuk-checkboxes__label" for="elements-wpa">
    Specialist equipment
    </label>
  </div>
  <div class="govuk-checkboxes__item">
    <input class="govuk-checkboxes__input" id="elements-wpa-2" name="elements-wpa" type="checkbox" value="mines">
    <label class="govuk-label govuk-checkboxes__label" for="elements-wpa-2">
    Mental health support
    </label>
  </div>
  <div class="govuk-checkboxes__item">
    <input class="govuk-checkboxes__input" id="elements-wpa-3" name="elements-wpa" type="checkbox" value="farm">
    <label class="govuk-label govuk-checkboxes__label" for="elements-wpa-3">
      Support worker
    </label>
  </div>
  <div class="govuk-checkboxes__item">
    <input class="govuk-checkboxes__input" id="elements-wpa-3" name="elements-wpa" type="checkbox" value="farm">
    <label class="govuk-label govuk-checkboxes__label" for="elements-wpa-3">
      Transport to work
    </label>
  </div>
  <div class="govuk-checkboxes__item">
    <input class="govuk-checkboxes__input" id="elements-wpa-3" name="elements-wpa" type="checkbox" value="farm">
    <label class="govuk-label govuk-checkboxes__label" for="elements-wpa-3">
      Travel during work
    </label>
  </div>
  <div class="govuk-checkboxes__item">
    <input class="govuk-checkboxes__input" id="elements-wpa-3" name="elements-wpa" type="checkbox" value="farm">
    <label class="govuk-label govuk-checkboxes__label" for="elements-wpa-3">
      Workplace adaptations
    </label>
  </div>
  <div class="govuk-checkboxes__item">
    <input class="govuk-checkboxes__input" id="elements-wpa-3" name="elements-wpa" type="checkbox" value="farm">
    <label class="govuk-label govuk-checkboxes__label" for="elements-wpa-3">
    Travel to work vehicle adaptations
    </label>
  </div>
</div>


  </fieldset>
</div>

         <button class="govuk-button" data-module="govuk-button">
           Save and continue
         </button>
       </form>
     </div>
   </div>
 </main>
</div>


{% endblock %}
