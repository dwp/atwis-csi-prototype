{% set page = "claim" %}
{% set claim = "true" %}
{% set title = "Case details" %}

{% extends folder + "/claim/_CSIBASE.html" %}

{% block csi %}

<form action="/current/cases/check-application/sae/details/type" method="post" novalidate>
<div class="govuk-width-container">


  <main class="govuk-main-wrapper " id="main-content" role="main">
    <div class="govuk-grid-row">
      <div class="govuk-grid-column-two-thirds">

            <fieldset class="govuk-fieldset">
      <h1 class="govuk-heading-l">

                     Is this item a wheelchair or a hearing aid? </h1>




                     <div class="govuk-radios " data-module="govuk-radios">
                       <div class="govuk-radios__item govuk-radios--inline">
                         <input class="govuk-radios__input" id="sae-check" name="sae-check" type="radio" value="Yes" {{ checked("sae-check", "Yes") }}>
                         <label class="govuk-label govuk-radios__label" for="sae-check">
                           Wheelchair
                         </label>
                       </div>
                       <div class="govuk-radios__item">
                         <input class="govuk-radios__input" id="sae-check-2" name="sae-check" type="radio" value="No" {{ checked("sae-check", "No") }}>
                         <label class="govuk-label govuk-radios__label" for="sae-check-2">
                           Hearing aid
                         </label>
                       </div>
                       <div class="govuk-radios__item">
                          <input class="govuk-radios__input" id="sae-check-2" name="sae-check" type="radio" value="No" {{ checked("sae-check", "No") }}>
                          <label class="govuk-label govuk-radios__label" for="sae-check-2">
                            Other
                          </label>
                        </div>

                     </div>

                   </fieldset>
                   </div>         </div><br>
                   <button class="govuk-button" data-module="govuk-button">
                   Save and continue
                   </button>

                   </form>


                   </main>
                 </div>


               {% endblock %}
