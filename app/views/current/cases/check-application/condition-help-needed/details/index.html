{% set page = "claim" %}
{% set claim = "true" %}
{% set title = "Case details" %}

{% extends folder + "/claim/_CSIBASE.html" %}

{% block csi %}
<br>

<div class="govuk-width-container">
<form action="/current/cases/check-application/condition-help-needed/index" method="post" novalidate>

  <main class="govuk-main-wrapper " id="main-content" role="main">
    <div class="govuk-grid-row">
      <div class="govuk-grid-column-two-thirds">


        <form action="" method="post" novalidate>











    <div class="govuk-form-group">
                <fieldset class="govuk-fieldset">
                  <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
                      From?

                  </legend>
                  <div class="govuk-radios govuk-radios--inline" data-module="govuk-radios">
                    <div class="govuk-radios__item govuk-radios--inline">
                      <input class="govuk-radios__input" id="condition-check-update" name="condition-check-update" type="radio" value="WPA Report" {{ checked("condition-check-update", "WPA Report") }}>
                      <label class="govuk-label govuk-radios__label" for="condition-check-update">
                        WPA Report
                      </label>
                    </div>
                    <div class="govuk-radios__item">
                      <input class="govuk-radios__input" id="condition-check-update-2" name="condition-check-update" type="radio" value="Citizen" {{ checked("condition-check-update", "Citizen") }}>
                      <label class="govuk-label govuk-radios__label" for="condition-check-update-2">
                        Citizen
                      </label>
                    </div>

                  </div>

                </fieldset>
        </div>

        <div class="govuk-form-group">
  <h1 class="govuk-label-wrapper"><label class="govuk-label govuk-label--m" for="more-detail">
      Can you provide more detail?
    </label>
  </h1>
  <div id="more-detail-hint" class="govuk-hint">
    <!-- Do not include personal or financial information, like your National Insurance number or credit card details. -->
  </div>
  <textarea class="govuk-textarea" id="more-detail" name="more-detail" rows="8" aria-describedby="more-detail-hint"></textarea>
</div>
            <button class="govuk-button" data-module="govuk-button">
              Save and continue
            </button>

          </form>
        </div>
      </div>
    </main>
  </div>


{% endblock %}
