

{% extends folder + "/claim/_CSIBASE.html" %}

{% block csi %}
<br>




<form action="" method="post" novalidate>


  <div class="govuk-width-container">
    <!-- <a href="#" class="govuk-back-link">Back</a> -->

    <main class="govuk-main-wrapper">

      <div class="govuk-grid-row">
        <div class="govuk-grid-column-two-thirds">

          <div class="govuk-form-group">
            <fieldset class="govuk-fieldset" aria-describedby="benefits-hint">
              <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
                <h1 class="govuk-fieldset__heading">
                  Is Dereck Smith reciving any benefits?
                </h1>
              </legend>
              <div id="benefits-hint" class="govuk-hint">
                Select all that apply.
              </div>
                 <p>Use Searchlight to check if Dereck Smith has an benefits.</p>
              <div class="govuk-checkboxes" data-module="govuk-checkboxes">
                <div class="govuk-checkboxes__item">
                  <input class="govuk-checkboxes__input" id="benefits" name="benefits" type="checkbox" value="Incapacity Benefit (IB), including the award of National Insurance credits only">
                  <label class="govuk-label govuk-checkboxes__label" for="benefits">
                    Incapacity Benefit (IB), including the award of National Insurance credits only
                  </label>
                </div>
                <div class="govuk-checkboxes__item">
                  <input class="govuk-checkboxes__input" id="benefits-2" name="benefits" type="checkbox" value="Employment Support Allowance (ESA) including the award of National Insurance credits only">
                  <label class="govuk-label govuk-checkboxes__label" for="benefits-2">
                    Employment Support Allowance (ESA) including the award of National Insurance credits only
                  </label>
                </div>
                <div class="govuk-checkboxes__item">
                  <input class="govuk-checkboxes__input" id="benefits-3" name="benefits" type="checkbox" value="Severe Disability Allowance (SDA)">
                  <label class="govuk-label govuk-checkboxes__label" for="benefits-3">
                    Severe Disability Allowance (SDA)
                  </label>
                </div>
                <div class="govuk-checkboxes__item">
                  <input class="govuk-checkboxes__input" id="benefits-4" name="benefits" type="checkbox" value="Income Support (IS) paid as a result of illness">
                  <label class="govuk-label govuk-checkboxes__label" for="benefits-4">
                    Income Support (IS) paid as a result of illness
                  </label>
                </div>
<div class="govuk-checkboxes__divider">or</div>

                <div class="govuk-checkboxes__item">
                  <input class="govuk-checkboxes__input" id="benefits-5" name="benefits" type="checkbox" value="None of the above" data-behaviour="exclusive">
                  <label class="govuk-label govuk-checkboxes__label" for="benefits-5">
                    None of the above
                  </label>
                </div>
              </div>

            </fieldset>
          </div>

           <button class="govuk-button" data-module="govuk-button">
             Save and continue
           </button>
         </form>
       </div>
     </div>


        </main>
        </div>



{% endblock %}
