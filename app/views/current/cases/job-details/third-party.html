{% set page = "claim" %}
{% set claim = "true" %}
{% set title = "Case details" %}

{% extends folder + "/claim/_CSIBASE.html" %}

{% block csi %}
<br>




<form action="" method="post" novalidate>


  <div class="govuk-width-container">


    <main class="govuk-main-wrapper">

      <div class="govuk-grid-row">
        <div class="govuk-grid-column-two-thirds">

  <div class="govuk-form-group">
             <fieldset class="govuk-fieldset">
               <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
                 <h2 class="govuk-fieldset__heading">
                Has a third party agreed to a cost share?
                 </h2>
               </legend>






               <div class="govuk-radios">
                 <div class="govuk-radios__item">
                   <input class="govuk-radios__input" id="employer-cost-share" name="employer-cost-share" type="radio" value="Yes~/current/cases/job-details/check.html" {{ checked("employer-cost-share", "Yes") }}>
                   <label class="govuk-label govuk-radios__label" for="employer-cost-share">
                     Yes
                   </label>
                 </div>
<!--
                 <div class="govuk-radios__item">
                   <input class="govuk-radios__input" id="employer-cost-share-2" name="employer-cost-share" type="radio" value="  Yes and a third party agreed to a cost share~/current/cases/job-details/check.html" {{ checked("employer-cost-share", "No but a third party agreed to the cost share") }}>
                   <label class="govuk-label govuk-radios__label" for="employer-cost-share-2">
                      Yes and a third party agreed to a cost share
                   </label>
                 </div> -->

                 <div class="govuk-radios__item">
                   <input class="govuk-radios__input" id="employer-cost-share-3" name="employer-cost-share" type="radio" value="No~/current/cases/job-details/unhappy-cost-share" {{ checked("employer-cost-share", "No") }}>
                   <label class="govuk-label govuk-radios__label" for="employer-cost-share-3">
                     No
                   </label>
                 </div>




               </div>

             </fieldset>
           </div>

           <button class="govuk-button" data-module="govuk-button">
             Save and continue
           </button>
         </form>
       </div>
     </div>


        </main>
        </div>



{% endblock %}
