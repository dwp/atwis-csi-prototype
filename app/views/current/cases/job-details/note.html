{% set page = "claim" %}
{% set claim = "true" %}
{% set title = "Case details" %}

{% extends folder + "/claim/_CSIBASE.html" %}

{% block csi %}
<br>

<div class="govuk-width-container">
        <form action="/current/cases/claim#your-tasks" method="post" novalidate>

  <main class="govuk-main-wrapper " id="main-content" role="main">
    <div class="govuk-grid-row">
  <div class="govuk-grid-column-two-thirds">

    <form class="form" action="/alpha-1h/your-job-and-employer/employment/start-date" method="post">


      <div class="govuk-character-count" data-module="govuk-character-count" data-maxlength="80">
        <div class="govuk-form-group">
          <h1 class="govuk-label-wrapper"><label class="govuk-label govuk-label--l" for="employment-job-description">
            What do you need to contact Dereck Smith regarding job details?
          </label>
          </h1>


          <p class="govuk-body">This will be added to your:</p>
          <ul class="govuk-list govuk-list--bullet">
            <li>Case history</li>
            <li>Contact Dereck Smith task</li>

          </ul>
          <textarea class="govuk-textarea govuk-js-character-count" id="employment-job-description" name="employment-job-description" rows="3" aria-describedby="employment-job-description-info employment-job-description-hint"></textarea><div id="employment-job-description-info" class="govuk-hint govuk-character-count__message" aria-live="polite">You have 80 characters remaining</div>
        </div>



      </div>



      <div class="govuk-!-padding-bottom-0"></div>


        <button class="govuk-button" data-module="govuk-button">Return to your tasks</button>
      </form>


  <div class="govuk-grid-column-one-third">

  </div>
</div>

  </div>
    </main>
  </div>


{% endblock %}
