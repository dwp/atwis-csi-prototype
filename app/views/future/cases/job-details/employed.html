{% set page = "claim" %}
{% set claim = "true" %}
{% set title = "Case details" %}

{% extends folder + "/claim/_CSIBASE.html" %}

{% block csi %}
<br>

<div class="govuk-width-container">


  <main class="govuk-main-wrapper " id="main-content" role="main">
    <div class="govuk-grid-row">
      <div class="govuk-grid-column-two-thirds">
        <h1 class="govuk-heading-xl">Job details</h1>

        <form action="/form-handler" method="post" novalidate>

          <div class="govuk-form-group">
            <label class="govuk-label govuk-label--m" for="job-title">
              Job title
            </label>
            <div id="job-title-hint" class="govuk-hint">

            </div>
            <input class="govuk-input govuk-input--width-10" id="job-title" name="job-title" type="text" aria-describedby="job-title-hint" value="QA Engineer ">
          </div>

          <div class="govuk-form-group">
            <label class="govuk-label govuk-label--m" for="passport-number">
              Employer name
            </label>
            <div id="passport-number-hint" class="govuk-hint">

            </div>
            <input class="govuk-input govuk-input--width-10" id="passport-number" name="passport-number" type="text" aria-describedby="passport-number-hint" value="DWP Digital">
          </div>

          <div class="govuk-form-group">
            <label class="govuk-label govuk-label--m" for="passport-number">
              Employer threshold limit
            </label>
            <div id="passport-number-hint" class="govuk-hint">
Number of employees
            </div>
            <input class="govuk-input govuk-input--width-3" id="passport-number" name="passport-number" type="number" aria-describedby="passport-number-hint" value="300">
          </div>

          <button class="govuk-button" data-module="govuk-button">
            Save and continue
          </button>

        </form>
      </div>
    </div>
  </main>
</div>


{% endblock %}
